name: Docs CI

on:
  pull_request:
    paths:
      - "src/main/resources/openapi.yaml"
      - "docs/**"
  push:
    branches: [master]
    paths:
      - "src/main/resources/openapi.yaml"
      - "docs/**"

jobs:
  # One job for both linters: each extra job pays its own runner spin-up and
  # checkout, and these finish in seconds.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: npx --yes @stoplight/spectral-cli@6.16.1 lint src/main/resources/openapi.yaml --ruleset tooling/.spectral.yaml
      # Run Vale directly (pinned) instead of the reviewdog-based action: it
      # avoids the action's PR-only reporter and resolves StylesPath relative to
      # the ruleset. StylesPath in tooling/.vale.ini points at tooling/styles.
      - name: Vale prose lint
        run: |
          curl -sSfL https://github.com/errata-ai/vale/releases/download/v3.15.1/vale_3.15.1_Linux_64-bit.tar.gz \
            | tar -xz vale
          ./vale --config=tooling/.vale.ini docs

  draft-docs-from-spec-change:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # create-pull-request needs write to push the draft branch and open the PR;
    # the default GITHUB_TOKEN is read-only.
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      # On the first commit this produces an empty file; the script detects
      # that and skips drafting instead of diffing against nothing.
      - run: git show HEAD~1:src/main/resources/openapi.yaml > /tmp/old-spec.yaml || true
      - name: Draft docs update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic  # optional for the script; gives SDK retries/timeouts in CI
          python3 tooling/scripts/draft_docs_from_diff.py \
            --old-spec /tmp/old-spec.yaml \
            --new-spec src/main/resources/openapi.yaml \
            --doc docs/getting-started.md \
            --out docs/getting-started.md \
            --product-name "Petstore"
      - uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: draft update from spec change"
          title: "[auto-draft] Update docs for spec change"
          body: "Opened automatically from a spec diff. Needs human review before merge."
          branch: auto/docs-draft

  sync-to-docs-site:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs-sync to the aggregator site
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.DOCS_SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/brooklynpickles/docs-pipeline-site/dispatches \
            -d '{"event_type":"docs-sync","client_payload":{"repo":"swagger-petstore","ref":"master","product_dir":"petstore","label":"Petstore","position":1}}'
