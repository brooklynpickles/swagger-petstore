extends: ["spectral:oas"]
rules:
  # spectral:oas built-ins relaxed for forked upstream specs we don't author.
  # duplicated-entry-in-enum crashes nimma on GitHub's spec (null enum node),
  # so it must be disabled; the example/path checks fire heavily on real specs
  # and aren't actionable upstream, so they're guidance (warn), not blockers.
  duplicated-entry-in-enum: off
  oas3-valid-media-example: warn
  oas3-valid-schema-example: warn
  path-params: warn
  # Custom doc-completeness rules: guidance, not CI blockers on upstream specs.
  operation-description: warn
  operation-tags: warn
  info-description: warn
  schema-properties-have-description:
    description: "Every schema property should have a description for docs generation to produce useful reference pages."
    severity: warn
    given: "$.components.schemas.*.properties.*"
    then:
      field: description
      function: truthy
