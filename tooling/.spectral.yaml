extends: ["spectral:oas"]
rules:
  operation-description: error
  operation-tags: error
  info-description: error
  schema-properties-have-description:
    description: "Every schema property should have a description for docs generation to produce useful reference pages."
    # warn (not error) so the stock spec's undescribed properties surface as
    # guidance without failing CI; tighten to error once descriptions land.
    severity: warn
    given: "$.components.schemas.*.properties.*"
    then:
      field: description
      function: truthy
